<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>魔法の数字検索 - 管理画面</title>
  <link rel="icon" href="icons/icon.png" type="image/png">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
    .container { background-color: white; padding: 20px 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.5em; border-bottom: 2px solid #e1e4e8; padding-bottom: 10px; margin-top: 0; }
    .tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; border: 1px solid transparent; border-bottom: none; border-radius: 4px 4px 0 0; }
    .tab.active { background-color: #fff; border-color: #ddd; border-bottom-color: transparent; margin-bottom: -1px; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    button { background-color: #0366d6; color: white; border: none; padding: 8px 16px; font-size: 0.9em; border-radius: 4px; cursor: pointer; margin-right: 10px; }
    button:hover { background-color: #005cc5; }
    .btn-danger { background-color: #d73a49; }
    .btn-danger:hover { background-color: #cb2431; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f6f8fa; }
    .action-cell { text-align: center; }
    .status { margin-top: 15px; font-size: 0.9em; color: #2ea44f; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>◆ 魔法の数字検索 - 管理画面</h1>
    
    <div class="tabs">
      <div class="tab active" data-target="favorites-tab">★ お気に入り</div>
      <div class="tab" data-target="history-tab">■ 検索履歴</div>
      <div class="tab" data-target="engines-tab">🔍 検索設定</div>
    </div>

    <!-- お気に入りタブ -->
    <div id="favorites-tab" class="tab-content active">
      <button id="downloadFavBtn">お気に入りをCSVで出力</button>
      <button id="clearFavBtn" class="btn-danger">お気に入りをすべて削除</button>
      <table id="favTable">
        <thead>
          <tr>
            <th>登録日時</th>
            <th>魔法の数字</th>
            <th>ページタイトル</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 検索履歴タブ -->
    <div id="history-tab" class="tab-content">
      <p>検索履歴は最大100件まで自動保存されます。</p>
      <button id="downloadHistBtn">検索履歴をCSVで出力</button>
      <button id="clearHistBtn" class="btn-danger">履歴をすべて削除</button>
      <p class="status" id="histStatus"></p>
    </div>

    <!-- 検索設定タブ -->
    <div id="engines-tab" class="tab-content">
      <p>右クリックメニューに表示する検索サイトを設定します（最大5個まで登録可能）。</p>
      
      <!-- 新規追加フォーム -->
      <div style="background: #f6f8fa; padding: 15px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 20px;">
        <h3 style="margin-top: 0; font-size: 1.1em; color: #333;">検索サイトの追加</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
          <input type="text" id="engineNameInput" placeholder="サイト名（例: 動画Wiki）" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 1; min-width: 150px;">
          <input type="text" id="engineUrlInput" placeholder="検索URL（例: https://example.com/?q={query}）" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 2; min-width: 300px;">
          <button id="addEngineBtn">追加する</button>
        </div>
        <small style="color: #666;">※ 検索キーワード（魔法の数字）が入る部分には <strong><code>{query}</code></strong> と記述してください。</small>
      </div>

      <!-- 検索エンジン一覧 -->
      <table id="engineTable">
        <thead>
          <tr>
            <th>表示名</th>
            <th>検索URLテンプレート</th>
            <th style="width: 100px; text-align: center;">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p class="status" id="engineStatus"></p>
    </div>

  </div>
  <script src="options.js"></script>
</body>
</html>
